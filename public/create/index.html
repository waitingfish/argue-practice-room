<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>吵了么</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%92%A2%3C/text%3E%3C/svg%3E" />
    <link rel="stylesheet" href="/shared/styles.css" />
  </head>
  <body>
    <main class="create-page">
      <a class="back-button" href="/">返回</a>
      <form id="createForm" class="create-form">
        <h1>你想吵的那个人，那件事。<br />说出来。</h1>
        <textarea id="scenarioInput" required placeholder="比如：我室友总是不洗碗，脏碗在水池堆了一个星期，都发臭了……"></textarea>
        <p>TA 是——</p>
        <div class="gender-options">
          <label><input type="radio" name="opponentGender" value="male" />男性</label>
          <label><input type="radio" name="opponentGender" value="female" />女性</label>
          <label><input type="radio" name="opponentGender" value="unspecified" checked />无所谓</label>
        </div>
        <button type="submit" id="createButton">把 TA 叫出来</button>
        <section class="generation-progress" id="generationProgress" hidden aria-live="polite">
          <div class="progress-track" aria-hidden="true"><span id="progressBar"></span></div>
          <p id="createStatus">任务准备中</p>
          <small id="jobReference"></small>
        </section>
        <p class="create-note" id="createNote">文案与场景图全部完成后，场景才会发布。</p>
      </form>
    </main>
    <script src="/shared/created-scenes-store.js"></script>
    <script src="/create/app.js"></script>
  </body>
</html>
