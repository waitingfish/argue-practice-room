<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>吵了么</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%92%A2%3C/text%3E%3C/svg%3E" />
    <link rel="stylesheet" href="/shared/styles.css" />
  </head>
  <body>
    <main class="experience" data-scene="phone-night" data-view="lobby">
      <section class="view lobby" aria-label="选择练习场景">
        <div class="lobby-backdrop" aria-hidden="true"></div>
        <div class="scene-carousel" aria-label="预制练习场景">
          <button class="scene-nav scene-nav-prev" type="button" aria-label="上一个场景">‹</button>
          <div class="scene-gallery" id="presetSceneGallery" aria-label="预制练习场景">
            <a class="hero-scene default-scene" href="/scene/restaurant-smoking">
              <img src="./assets/restaurant-smoking/home-card.webp" alt="餐厅邻座吸烟" />
              <span>餐厅。邻座刚点起一根烟。</span>
            </a>
            <a class="hero-scene default-scene" href="/scene/phone-night">
              <img src="./assets/sketch-default/home-card.webp" alt="深夜情侣矛盾" />
              <span>深夜。你准备找她沟通。</span>
            </a>
            <a class="hero-scene default-scene" href="/scene/roommate-gaming">
              <img src="./assets/roommate-gaming/home-card.webp" alt="半夜室友打游戏" />
              <span>合租房。室友还在打游戏。</span>
            </a>
          </div>
          <button class="scene-nav scene-nav-next" type="button" aria-label="下一个场景">›</button>
        </div>

        <div class="lobby-bottom">
          <section class="lobby-own-scenes" id="localSceneSection" aria-label="你造过的场景" hidden>
            <p class="overline">你造过的</p>
            <nav class="scene-picks" id="localScenePicks" aria-label="你造过的场景"></nav>
          </section>
          <a class="entry-question" href="/create">……还有哪件事，是你一直没说清的？</a>
          <a class="entry-hint" href="/create">一句话，造一场只属于你的架</a>
          <details class="project-source">
            <summary>想拆开看看这间练习室怎么搭起来的吗？</summary>
            <a href="https://github.com/waitingfish/argue-practice-room" target="_blank" rel="noreferrer">去 GitHub 看本项目</a>
          </details>
        </div>
      </section>

      <section class="view intro" aria-live="polite">
        <button class="back-button" data-back type="button" aria-label="返回场景选择">返回</button>
        <div class="intro-copy">
          <p id="introLineOne"></p>
          <p id="introLineTwo"></p>
          <p id="introLineThree"></p>
        </div>
        <button class="continue-button" id="continueScene" type="button">继续</button>
      </section>

      <section class="view arena" aria-label="对话练习">
        <div class="arena-art" aria-hidden="true"></div>
        <button class="back-button light" data-back type="button" aria-label="返回场景选择">退出</button>
        <div class="arena-copy">
          <p class="scene-kicker" id="sceneKicker"></p>
          <h1 id="arenaTitle"></h1>
          <p id="arenaIntro"></p>
        </div>

        <section class="conversation" id="conversation" aria-live="polite">
          <article class="line opponent-line"><span>对方</span><p id="opponentLine"></p></article>
        </section>

        <form class="speak-box" id="replyForm">
          <label for="replyInput">现在，开口</label>
          <div class="speak-row">
            <textarea id="replyInput" rows="1" placeholder="写下你真正想说的话"></textarea>
            <button id="submitButton" type="submit">说</button>
          </div>
          <p id="modelState" role="status"></p>
        </form>
      </section>
    </main>
    <script src="/shared/created-scenes-store.js"></script>
    <script src="/lobby/app.js"></script>
  </body>
</html>
