<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>吵了么</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%92%A2%3C/text%3E%3C/svg%3E" />
    <link rel="stylesheet" href="/shared/styles.css" />
  </head>
  <body>
    <main class="replay-page" id="replayPage">
      <div class="replay-backdrop" aria-hidden="true"></div>
      <section class="replay-intro" id="replayIntro">
        <h1>有人把一场架，留在了这里。</h1>
        <button id="replayEnter" type="button" disabled>轻触，回到那一刻</button>
      </section>
      <header class="replay-header">
        <a href="/">回到首页</a>
        <button id="shareReplay" type="button">分享</button>
      </header>
      <section class="replay-title" aria-live="polite">
        <p id="replayKicker">对话回放</p>
        <h1 id="replayTitle">正在打开这场对话…</h1>
        <p id="replayOutcome"></p>
      </section>
      <section class="replay-stage" aria-live="polite">
        <article class="replay-current" id="replayCurrent">
          <span id="replaySpeaker"></span>
          <p id="replayText"></p>
        </article>
      </section>
      <dialog class="replay-ended-dialog" id="replayEndedDialog" aria-labelledby="replayEndedTitle">
        <p>这场架已经放完了</p>
        <h2 id="replayEndedTitle">要不要也来吵一架？</h2>
        <div>
          <button class="primary" id="startArgue" type="button">我也来吵一架</button>
          <button id="replayAgain" type="button">再听一次</button>
        </div>
      </dialog>
    </main>
    <script src="/replay/app.js"></script>
  </body>
</html>
