<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>练习室后台配置</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="admin-page">
    <main class="admin-shell">
      <header class="admin-header">
        <div>
          <p class="eyebrow">LOCAL ADMIN</p>
          <h1>练习室后台</h1>
          <p>模型凭证只保存在本机服务端，不会发送到练习页面。</p>
        </div>
        <a class="admin-link" href="./index.html">返回练习室</a>
      </header>

      <section class="admin-panel" id="loginPanel">
        <p class="label">访问验证</p>
        <h2>输入后台访问码</h2>
        <form id="loginForm" class="settings-form compact-form">
          <label>后台访问码<input id="adminPassword" type="password" autocomplete="current-password" required /></label>
          <button type="submit">进入配置</button>
        </form>
        <p class="form-note">首次运行默认访问码为 <code>admin</code>，请进入后立刻修改。</p>
      </section>

      <section class="admin-panel hidden" id="settingsPanel">
        <div class="panel-heading">
          <div>
            <p class="label">模型连接</p>
            <h2>对话与教练配置</h2>
          </div>
          <span class="connection-badge" id="connectionBadge">未保存</span>
        </div>

        <form id="settingsForm" class="settings-form">
          <label>接口地址<input id="baseUrl" name="baseUrl" type="url" required placeholder="https://api.openai.com/v1 或完整 /chat/completions 地址" /></label>
          <label>模型名称<input id="model" name="model" type="text" required placeholder="gpt-4.1-mini" /></label>
          <label>API Key<input id="apiKey" name="apiKey" type="password" autocomplete="new-password" placeholder="留空则保留已保存的密钥" /></label>
          <label>温度
            <input id="temperature" name="temperature" type="number" min="0" max="2" step="0.1" value="0.7" />
          </label>
          <label class="wide-label">安全与表达原则
            <textarea id="systemPrompt" name="systemPrompt" rows="6"></textarea>
          </label>
          <div class="wide-label settings-divider">场景图片生成</div>
          <label>图片接口地址<input id="imageBaseUrl" name="imageBaseUrl" type="url" placeholder="留空则使用文案接口地址，或填写完整 /images/generations 地址" /></label>
          <label>图片模型名称<input id="imageModel" name="imageModel" type="text" placeholder="gpt-image-1" /></label>
          <label>图片超时秒数<input id="imageTimeoutSeconds" name="imageTimeoutSeconds" type="number" min="30" max="300" step="10" value="180" /></label>
          <label class="wide-label">图片 API Key<input id="imageApiKey" name="imageApiKey" type="password" autocomplete="new-password" placeholder="留空则使用文案 API Key" /></label>
          <div class="wide-label settings-divider">沉浸模式 · 语音识别</div>
          <label>识别方式
            <select id="transcriptionMode" name="transcriptionMode">
              <option value="local">本地 whisper.cpp</option>
              <option value="openai">OpenAI Audio API</option>
              <option value="mimo">小米 MiMo Chat 音频协议</option>
            </select>
          </label>
          <label>识别模型<input id="transcriptionModel" name="transcriptionModel" type="text" required placeholder="whisper-1" /></label>
          <label class="wide-label">识别接口地址<input id="transcriptionBaseUrl" name="transcriptionBaseUrl" type="url" required placeholder="本地 http://127.0.0.1:8080/inference，或服务商 /v1" /></label>
          <label>识别超时秒数<input id="transcriptionTimeoutSeconds" name="transcriptionTimeoutSeconds" type="number" min="15" max="300" step="5" value="120" /></label>
          <label>识别 API Key<input id="transcriptionApiKey" name="transcriptionApiKey" type="password" autocomplete="new-password" placeholder="本地模式不需要" /></label>
          <div class="wide-label settings-divider">沉浸模式 · 语音合成</div>
          <label>合成方式
            <select id="speechMode" name="speechMode"><option value="openai">OpenAI Audio API</option><option value="mimo">小米 MiMo Chat 音频协议</option></select>
          </label>
          <label>合成接口地址<input id="speechBaseUrl" name="speechBaseUrl" type="url" placeholder="https://api.openai.com/v1（留空使用浏览器朗读）" /></label>
          <label>合成模型<input id="speechModel" name="speechModel" type="text" required placeholder="gpt-4o-mini-tts" /></label>
          <label>声音<input id="speechVoice" name="speechVoice" type="text" required placeholder="alloy" /></label>
          <label>音频格式
            <select id="speechFormat" name="speechFormat"><option value="mp3">MP3</option><option value="opus">Opus</option><option value="aac">AAC</option><option value="flac">FLAC</option><option value="wav">WAV</option></select>
          </label>
          <label>语速<input id="speechSpeed" name="speechSpeed" type="number" min="0.25" max="4" step="0.05" value="1" /></label>
          <label>合成超时秒数<input id="speechTimeoutSeconds" name="speechTimeoutSeconds" type="number" min="15" max="300" step="5" value="120" /></label>
          <label class="wide-label">语气指令<input id="speechInstruction" name="speechInstruction" type="text" placeholder="用自然、清晰、有情绪但不过度夸张的中文语气说话。" /></label>
          <label class="wide-label">合成 API Key<input id="speechApiKey" name="speechApiKey" type="password" autocomplete="new-password" placeholder="留空则使用对话 API Key" /></label>
          <label class="wide-label">新的后台访问码
            <input id="newAdminPassword" name="newAdminPassword" type="password" autocomplete="new-password" placeholder="留空则不修改" />
          </label>
          <div class="form-actions wide-label">
            <button type="submit">保存配置</button>
            <button id="testChatConnection" class="secondary-button" type="button">测试对话</button>
            <button id="testImageConnection" class="secondary-button" type="button">测试图片</button>
            <button id="testTranscriptionConnection" class="secondary-button" type="button">测试语音识别</button>
            <button id="testSpeechConnection" class="secondary-button" type="button">测试语音合成</button>
            <span id="saveStatus" role="status"></span>
          </div>
        </form>
        <p class="form-note">支持标准 OpenAI Audio API、小米 MiMo Chat 音频协议和本机 whisper.cpp。MiMo 的 ASR/TTS 使用 Chat Completions，不是标准 /audio 路径；四类测试彼此独立，都会使用当前表单内容，不必先保存。</p>
      </section>
    </main>
    <script src="./admin.js"></script>
  </body>
</html>
