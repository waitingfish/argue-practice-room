<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>吵架练习室</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="scene-page" data-phase="intro">
      <section class="route-intro">
        <a class="back-button" href="/">返回</a>
        <div class="intro-copy"><p id="introOne"></p><p id="introTwo"></p><p id="introThree"></p></div>
        <button class="continue-button" id="continueScene">继续</button>
      </section>

      <section class="route-mode" aria-labelledby="modeTitle">
        <a class="back-button" href="/">返回</a>
        <div class="mode-heading">
          <p id="modeKicker"></p>
          <h1 id="modeTitle">这一次，你想怎么练？</h1>
        </div>
        <div class="mode-options">
          <button class="mode-card" type="button" data-mode-choice="training">
            <span class="mode-icon" aria-hidden="true">⌨</span>
            <strong>训练模式</strong>
            <small>打字对话 · 可找专家帮忙 · 5 轮后复盘</small>
          </button>
          <button class="mode-card" type="button" data-mode-choice="immersive">
            <span class="mode-icon microphone-icon" aria-hidden="true">●</span>
            <strong>沉浸模式</strong>
            <small>对方先说 · 你直接开口 · 自动识别发送</small>
          </button>
        </div>
        <p class="mode-note" id="modeNote">两种模式分别保存会话，不会互相串线。</p>
      </section>

      <section class="route-arena">
        <div class="arena-art" aria-hidden="true"></div>
        <a class="back-button light" id="arenaExit" href="/">退出</a>
        <div class="arena-copy">
          <p class="scene-kicker" id="sceneKicker"></p>
          <h1 id="arenaTitle"></h1>
          <p id="arenaIntro"></p>
        </div>
        <section class="immersive-prelude" id="immersivePrelude" hidden aria-live="polite">
          <button id="immersiveBegin" type="button">深呼吸，开口</button>
        </section>
        <section class="conversation" id="conversation" aria-live="polite"></section>
        <form class="speak-box text-speak-box" id="replyForm">
          <div class="speak-head">
            <label for="replyInput">现在，开口</label>
            <div class="agent-actions">
              <button class="review-trigger" id="trainingEndButton" type="button">结束</button>
              <span class="review-tooltip" id="reviewTooltip" data-disabled="true" data-tooltip="完成 5 轮对话后可复盘">
                <button class="review-trigger" id="reviewButton" type="button" disabled aria-describedby="reviewTooltip">复盘</button>
              </span>
              <button class="coach-toggle" id="coachToggle" type="button" aria-pressed="false">找人帮忙</button>
            </div>
          </div>
          <div class="speak-row">
            <textarea id="replyInput" rows="1" placeholder="写下你真正想说的话"></textarea>
            <button id="submitButton" type="submit">说</button>
          </div>
          <p id="modelState"></p>
        </form>
        <section class="voice-box" id="voiceBox" aria-live="polite">
          <div class="voice-head">
            <div><span>沉浸对话</span><p id="voiceStatus">正在准备语音...</p></div>
            <button class="review-trigger" id="voiceEndButton" type="button">结束</button>
          </div>
          <div class="voice-orbit" id="voiceOrbit" data-state="idle">
            <div class="voice-bars" aria-hidden="true"><i></i><i></i><i></i><i></i><i></i></div>
            <div class="voice-core" aria-hidden="true"><span></span></div>
          </div>
          <p class="voice-hint" id="voiceHint">对方说完后直接开口，停顿后会自动发送</p>
          <audio id="speechPlayer" preload="auto"></audio>
        </section>
        <section class="argument-outcome" id="argumentOutcome" hidden aria-live="assertive">
          <p id="outcomeCopy"></p>
          <div class="outcome-mood"><span>吵完这一刻</span><strong id="outcomeMood"></strong></div>
          <button id="outcomeContinue" type="button">继续</button>
        </section>
      </section>

      <dialog class="outcome-dialog" id="outcomeDialog" aria-labelledby="outcomeDialogTitle">
        <p>裁判已经收起了哨子</p>
        <h2 id="outcomeDialogTitle">要看看你是怎么赢的吗？</h2>
        <div>
          <button class="primary" id="outcomeReview" type="button">生成复盘报告</button>
          <button id="outcomeSaveReplay" type="button">保存对话并分享</button>
          <button id="outcomeLeave" type="button">离开，回到首页</button>
        </div>
        <p class="outcome-save-status" id="outcomeSaveStatus" aria-live="polite"></p>
      </dialog>

      <section class="route-review">
        <header class="review-header">
          <p>复盘分析师</p>
          <h1>你不是来证明谁赢。<br />你是来看清自己怎么说。</h1>
        </header>
        <div class="analysis-loading" id="analysisLoading" aria-live="polite">
          <span></span>
          <p>正在把这场对话重新看一遍…</p>
        </div>
        <div class="analysis-report" id="analysisReport" hidden>
          <section class="report-lead">
            <p class="report-model" id="reportModel"></p>
            <h2>这场对话发生了什么</h2>
            <p id="reportOverview"></p>
            <blockquote id="reportTurningPoint"></blockquote>
          </section>
          <section class="score-section">
            <h2>表达状态</h2>
            <div class="score-grid" id="scoreGrid"></div>
          </section>
          <section class="personality-section">
            <div class="section-heading"><p>只谈这一次练习</p><h2>你的沟通倾向</h2></div>
            <p class="personality-summary" id="personalitySummary"></p>
            <div class="trait-list" id="traitList"></div>
          </section>
          <section class="report-columns">
            <div><h2>你已经做对的</h2><ul id="strengthList"></ul></div>
            <div><h2>容易卡住的地方</h2><ul id="riskList"></ul></div>
            <div><h2>下一次可以练</h2><ul id="nextStepList"></ul></div>
          </section>
          <section class="suggested-section">
            <p>换一种说法</p>
            <blockquote id="suggestedReply"></blockquote>
          </section>
          <footer class="report-footer">
            <p id="reportDisclaimer"></p>
            <button id="restartPractice" type="button">重新练一次</button>
          </footer>
        </div>
      </section>
    </main>
    <script src="/scene.js"></script>
  </body>
</html>
